name: release-termux

on:
  push:
    tags:
      - "v*-termux*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to release, for example v0.21.0-termux.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r27c
      NDK_DIR: ${{ github.workspace }}/android-ndk/android-ndk-r27c
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*-termux*) ;;
            *) echo "Invalid release tag: $TAG"; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build unzip file curl glslang-tools

      - name: Install Vulkan shader compiler (glslc)
        run: |
          set -euo pipefail
          # shaderc ships glslc. Pull a recent toolchain from LunarG's apt
          # repo matching the runner's Ubuntu codename so ggml-vulkan's
          # shader build can resolve modern GLSL extensions.
          CODENAME="$(lsb_release -cs)"
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          sudo wget -qO "/etc/apt/sources.list.d/lunarg-vulkan-${CODENAME}.list" \
            "https://packages.lunarg.com/vulkan/lunarg-vulkan-${CODENAME}.list"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            vulkan-headers shaderc libvulkan-dev
          glslc --version

      - name: Stage isolated vulkan headers
        run: |
          set -euo pipefail
          # Isolate the host vulkan/*.h* tree in a dedicated dir so we can
          # pass it to the NDK cross-compile via -isystem without leaking
          # unrelated glibc headers from /usr/include.
          SRC_DIR="$(dpkg -L vulkan-headers libvulkan-dev 2>/dev/null \
            | grep -E '/include/vulkan/vulkan\.hpp$' \
            | head -1 | xargs -I{} dirname {} | xargs -I{} dirname {} || true)"
          if [ -z "$SRC_DIR" ]; then
            HPP="$(find /usr /opt -name vulkan.hpp 2>/dev/null | head -1 || true)"
            SRC_DIR="$(dirname "$(dirname "$HPP")")"
          fi
          if [ -z "$SRC_DIR" ] || [ ! -f "$SRC_DIR/vulkan/vulkan.hpp" ]; then
            echo "ERROR: vulkan.hpp not found after vulkan-headers install" >&2
            exit 1
          fi
          STAGED="$RUNNER_TEMP/vulkan-headers"
          mkdir -p "$STAGED"
          cp -r "$SRC_DIR/vulkan" "$STAGED/"
          # vk_video/ is referenced by the recent vulkan.hpp.
          if [ -d "$SRC_DIR/vk_video" ]; then
            cp -r "$SRC_DIR/vk_video" "$STAGED/"
          fi
          echo "Staged vulkan headers at: $STAGED"
          ls "$STAGED"
          echo "VULKAN_HOST_INCLUDE=$STAGED" >> "$GITHUB_ENV"

      - name: Validate tag matches package version
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.meta.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          test "$TAG_VERSION" = "$PKG_VERSION"

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-ndk
          key: android-ndk-${{ env.NDK_VERSION }}

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK_DIR")"
          curl -fsSL \
            "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" \
            -o /tmp/android-ndk.zip
          unzip -q /tmp/android-ndk.zip -d "$(dirname "$NDK_DIR")"

      - name: Build Android release assets
        env:
          NDK_ROOT: ${{ env.NDK_DIR }}
          BUILD_VULKAN: "1"
        run: ./scripts/build_termux.sh

      - name: Verify release assets
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          test -f "dist/ollama-termux-${VERSION}-android-arm64.tar.gz"
          test -f "dist/ollama-termux-${VERSION}-android-arm64.tar.gz.sha256"

      - name: Generate release notes
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          ollama-termux ${VERSION}

          Built from upstream Ollama and published as a Termux-first Android ARM64 fork.

          Release assets:
          - ollama-termux-${VERSION}-android-arm64.tar.gz
          - ollama-termux-${VERSION}-android-arm64.tar.gz.sha256
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
