name: release-termux

on:
  push:
    tags:
      - "v*-termux*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r27c
      NDK_DIR: ${{ github.workspace }}/android-ndk/android-ndk-r27c
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build unzip file curl

      - name: Validate tag matches package version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          test "$TAG_VERSION" = "$PKG_VERSION"

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-ndk
          key: android-ndk-${{ env.NDK_VERSION }}

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK_DIR")"
          curl -fsSL \
            "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" \
            -o /tmp/android-ndk.zip
          unzip -q /tmp/android-ndk.zip -d "$(dirname "$NDK_DIR")"

      - name: Build Android release assets
        env:
          NDK_ROOT: ${{ env.NDK_DIR }}
        run: ./scripts/build_termux.sh

      - name: Verify release assets
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          test -f "dist/ollama-termux-${VERSION}-android-arm64.tar.gz"
          test -f "dist/ollama-termux-${VERSION}-android-arm64.tar.gz.sha256"

      - name: Generate release notes
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          ollama-termux ${VERSION}

          Built from upstream Ollama and published as a Termux-first Android ARM64 fork.

          Release assets:
          - ollama-termux-${VERSION}-android-arm64.tar.gz
          - ollama-termux-${VERSION}-android-arm64.tar.gz.sha256
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

