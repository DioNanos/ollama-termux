name: release-termux

on:
  push:
    tags:
      - "v*-termux*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to release, for example v0.21.0-termux.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r27c
      NDK_DIR: ${{ github.workspace }}/android-ndk/android-ndk-r27c
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*-termux*) ;;
            *) echo "Invalid release tag: $TAG"; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            unzip file curl ca-certificates python3

      - name: Verify public release safety
        run: bash .github/scripts/verify-public-release-safety.sh

      - name: Validate tag matches package version
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.meta.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          test "$TAG_VERSION" = "$PKG_VERSION"

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-ndk
          key: android-ndk-${{ env.NDK_VERSION }}

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$NDK_DIR")"
          curl -fsSL \
            "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" \
            -o /tmp/android-ndk.zip
          unzip -q /tmp/android-ndk.zip -d "$(dirname "$NDK_DIR")"

      - name: Resolve reused Termux lib source
        run: |
          set -euo pipefail
          REUSE_TAG="${{ vars.TERMUX_REUSE_RELEASE_TAG }}"
          if [ -z "$REUSE_TAG" ]; then
            REUSE_TAG="$(node -p "require('./package.json').termuxReuseReleaseTag")"
          fi
          echo "TERMUX_REUSE_RELEASE_TAG=$REUSE_TAG" >> "$GITHUB_ENV"

      - name: Build Android release assets
        env:
          NDK_ROOT: ${{ env.NDK_DIR }}
        run: ./scripts/build_termux.sh

      - name: Verify release assets
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          test -f "dist/ollama-termux-${VERSION}-android-arm64.tar.gz"
          test -f "dist/ollama-termux-${VERSION}-android-arm64.tar.gz.sha256"

      - name: Generate release notes
        env:
          UPSTREAM_TAG: v0.22.1
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          export TERMUX_VERSION="$VERSION"
          if [ -z "${TERMUX_REUSE_RELEASE_TAG:-}" ]; then
            export TERMUX_REUSE_RELEASE_TAG="$(node -p "require('./package.json').termuxReuseReleaseTag")"
          fi
          python3 .github/scripts/generate_termux_release_notes.py "$RUNNER_TEMP/release-notes.md"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
