name: package-validation

on:
  pull_request:
    paths:
      - "install.js"
      - "package.json"
      - ".npmignore"
      - "README.md"
      - "docs/BUILDING.md"
      - ".github/workflows/release.yaml"
      - ".github/workflows/npm-publish.yaml"
      - ".github/workflows/test-install.yaml"

jobs:
  validate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate installer syntax
        run: node -c install.js

      - name: Verify public release safety
        run: bash .github/scripts/verify-public-release-safety.sh

      - name: Validate npm package contents
        run: npm pack --dry-run
